name: Main branch guard

on:
  pull_request:
    branches: [main]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow merges from develop
        if: github.head_ref != 'develop'
        run: |
          echo "::error::PRs to main must come from develop, not '${{ github.head_ref }}'"
          exit 1
      - name: Source branch OK
        if: github.head_ref == 'develop'
        run: echo "Merge from develop — allowed"
